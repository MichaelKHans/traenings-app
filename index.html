<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness Master 3000 - V2.6</title>
    
    <style>
        :root {
            --bg-color: #0d1117; 
            --card-bg: #161b22;  
            --text-color: #e6edf3;
            --muted-text: #8b949e;
            --neon-green: #39ff14;
            --neon-cyan: #00ffff;
            --neon-purple: #9d00ff;
            --neon-orange: #ff8c00;
            --neon-yellow: #ffff00;
            --neon-red: #ff003c;
            --retro-shadow: 6px 6px 0px rgba(0,0,0,0.8);
            --font-family: 'Courier New', Courier, monospace;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            padding-bottom: 280px; 
            box-sizing: border-box;
            font-weight: bold;
        }

        h1 { text-align: center; color: var(--neon-green); text-transform: uppercase; text-shadow: 0 0 5px var(--neon-green); font-size: 1.5em; margin-bottom: 15px; }
        
        /* Kalender */
        .calendar-container { background-color: #000; border: 2px solid var(--neon-purple); padding: 10px; margin-bottom: 20px; border-radius: 4px; box-shadow: 4px 4px 0px var(--neon-purple); }
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; color: var(--neon-purple); margin-bottom: 10px; text-transform: uppercase; font-size: 0.9em; }
        .nav-btn { background: #111; border: 1px solid var(--neon-purple); color: var(--neon-purple); padding: 5px 15px; cursor: pointer; font-family: inherit; }
        .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        
        .day-box {
            display: flex; flex-direction: column; align-items: center; padding: 8px 0; border: 1px solid #333; border-radius: 4px; cursor: pointer; font-size: 0.6em; background: #111; min-height: 65px; justify-content: space-between;
        }
        .day-box.active { border-color: var(--neon-green); background-color: rgba(57, 255, 20, 0.1); color: var(--neon-green); }
        .weight-display { color: var(--neon-yellow); font-size: 0.9em; font-weight: bold; }
        .day-check { font-size: 1.1em; visibility: hidden; }
        .day-box.active .day-check { visibility: visible; }

        #progress-container { width: 100%; background-color: #000; border: 2px solid var(--muted-text); height: 12px; margin-bottom: 15px; }
        #progress-bar { width: 0%; height: 100%; background-color: var(--neon-cyan); transition: all 0.3s ease; }

        .timer-container { margin-bottom: 25px; text-align: center; }
        .timer-btn { background-color: #000; color: var(--neon-orange); border: 2px solid var(--neon-orange); padding: 10px; width: 100%; font-family: inherit; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .timer-bar-fill { width: 0%; height: 100%; background-color: var(--neon-orange); transition: width 1s linear; }

        /* Øvelseskort med SUPER-tydelige farver */
        .exercise-card { background-color: var(--card-bg); padding: 15px; margin-bottom: 25px; border-left: 10px solid var(--muted-text); box-shadow: var(--retro-shadow); position: relative; }
        
        .card-0 { border-left-color: var(--neon-cyan) !important; }
        .card-0 .exercise-name { color: var(--neon-cyan) !important; text-shadow: 0 0 5px var(--neon-cyan); }

        .card-1 { border-left-color: var(--neon-green) !important; }
        .card-1 .exercise-name { color: var(--neon-green) !important; text-shadow: 0 0 5px var(--neon-green); }

        .card-2 { border-left-color: var(--neon-purple) !important; }
        .card-2 .exercise-name { color: var(--neon-purple) !important; text-shadow: 0 0 5px var(--neon-purple); }

        .card-3 { border-left-color: var(--neon-orange) !important; }
        .card-3 .exercise-name { color: var(--neon-orange) !important; text-shadow: 0 0 5px var(--neon-orange); }

        .card-4 { border-left-color: var(--neon-yellow) !important; }
        .card-4 .exercise-name { color: var(--neon-yellow) !important; text-shadow: 0 0 5px var(--neon-yellow); }

        .card-5 { border-left-color: var(--neon-red) !important; }
        .card-5 .exercise-name { color: var(--neon-red) !important; text-shadow: 0 0 5px var(--neon-red); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .info-btn { background: #000; color: #fff; border: 1px solid #555; padding: 4px 8px; font-size: 0.7em; cursor: pointer; font-family: inherit; }
        .info-box { display: none; background-color: #000; border: 1px solid var(--neon-cyan); padding: 12px; margin: 10px 0; font-size: 0.85em; color: var(--text-color); line-height: 1.4; }
        .info-box.show { display: block; }

        .status-group { display: flex; gap: 5px; margin-bottom: 15px; }
        .status-btn { flex: 1; background-color: #000; border: 1px solid var(--muted-text); color: var(--muted-text); padding: 8px 0; font-family: inherit; font-size: 0.75em; font-weight: bold; cursor: pointer; }
        .active-g { border-color: var(--neon-green) !important; color: var(--neon-green) !important; }
        .active-y { border-color: var(--neon-yellow) !important; color: var(--neon-yellow) !important; }
        .active-r { border-color: var(--neon-red) !important; color: var(--neon-red) !important; }

        .set-row { margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .set-inputs { display: flex; align-items: center; justify-content: space-between; }
        
        input[type="number"], input[type="text"] { 
            width: 65px; padding: 10px; background-color: #000; border: 2px solid var(--muted-text); color: var(--neon-yellow); text-align: center; font-family: inherit; font-size: 16px; 
        }
        #api_key_input { width: 100%; box-sizing: border-box; text-align: left; font-size: 11px; margin-bottom: 10px; border-color: var(--neon-cyan); color: var(--neon-cyan); }
        
        textarea { width: 100%; padding: 10px; background-color: #000; border: 1px solid var(--muted-text); color: #fff; margin-top: 5px; font-family: inherit; box-sizing: border-box; }

        /* AI CHAT */
        .ai-log-section { background-color: #000; border: 2px solid var(--neon-cyan); padding: 15px; margin-bottom: 20px; box-shadow: 4px 4px 0px var(--neon-cyan); }
        #ai-response-box { 
            display: none; background-color: #111; border: 1px solid var(--neon-green); padding: 12px; 
            margin-top: 15px; color: var(--neon-green); font-size: 0.85em; line-height: 1.5; 
        }

        .bottom-fixed-container { position: fixed; bottom: 0; left: 0; width: 100%; background-color: var(--bg-color); padding: 15px; border-top: 2px solid #333; z-index: 1000; }
        .btn-container { display: flex; gap: 10px; flex-wrap: wrap; }
        button.action-btn { flex: 1; min-width: 120px; padding: 15px; font-weight: bold; text-transform: uppercase; cursor: pointer; font-family: inherit; border-radius: 4px; }
        .btn-save { background: #000; color: var(--neon-green); border: 2px solid var(--neon-green); }
        .btn-ai { background: var(--neon-cyan); color: #000; border: none; }
        .btn-export { background: var(--neon-purple); color: #fff; border: none; }
        
        #version-info { text-align: center; font-size: 0.7em; color: #555; margin-top: 10px; cursor: pointer; }
        #toast { visibility: hidden; position: fixed; left: 50%; bottom: 200px; transform: translateX(-50%); background: var(--neon-cyan); color: #000; padding: 10px 20px; font-weight: bold; z-index: 2000; text-transform: uppercase; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

    <h1>Fitness Master</h1>
    
    <div class="calendar-container">
        <div class="calendar-nav">
            <button class="nav-btn" onclick="changeWeek(-1)">&lt;</button>
            <span id="week-display">UGE --</span>
            <button class="nav-btn" onclick="changeWeek(1)">&gt;</button>
        </div>
        <div class="week-grid" id="week-grid"></div>
    </div>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div class="timer-container">
        <button class="timer-btn" id="timer-btn" onclick="startTimer()">[ Start 90 sek Pause ]</button>
        <div style="width:100%; height:8px; background:#000; border:1px solid #333; margin-top:5px;">
            <div class="timer-bar-fill" id="timer-fill"></div>
        </div>
    </div>

    <div id="workout-container"></div>

    <div class="ai-log-section">
        <div style="color:var(--neon-cyan); font-size:0.8em; text-transform:uppercase; margin-bottom:8px;">🤖 SPØRG GEMINI (Live Sparring)</div>
        <textarea id="ai_log_input" placeholder="Fx: 'Mine ben er ømme, skal jeg tage 3 sæt?'"></textarea>
        <div id="ai-response-box"></div>
    </div>

    <div class="bottom-fixed-container">
        <div class="btn-container">
            <button class="action-btn btn-save" onclick="saveData()">[Gem]</button>
            <button class="action-btn btn-ai" onclick="askGemini()">[Spørg Gemini]</button>
            <button class="action-btn btn-export" onclick="exportData()">[Log]</button>
        </div>
        <div id="version-info" onclick="toggleSettings()">V2.6 | Indstillinger ⚙️</div>
        
        <div id="settings-area" style="display:none; padding-top:15px; border-top: 1px dashed #444; margin-top: 10px;">
            <div style="color: var(--neon-cyan); font-size: 0.7em; margin-bottom: 5px;">DIN API NØGLE (STABIL v1):</div>
            <input type="text" id="api_key_input" placeholder="Indsæt din nøgle her...">
            <div style="display: flex; gap: 5px;">
                <button class="action-btn btn-save" style="padding:10px; flex: 2;" onclick="saveKey()">Gem Nøgle</button>
                <button class="action-btn" style="padding:10px; flex: 1; background: #222; color: var(--neon-red); border: 1px solid var(--neon-red);" onclick="deleteKey()">Slet</button>
            </div>
        </div>
    </div>

    <div id="toast">SYSTEM GEMT</div>

<script>
    const exercises = [
        { id: 'cardio', name: 'Løbebånd (Varme)', type: 'cardio', info: '1 min løb / 2 min gang (x 3-4).' },
        { id: 'benpres', name: 'Siddende Benpres', type: 'strength', sets: 3, info: 'Mål: 10-12 reps. Pres lænden tilbage.' },
        { id: 'brystpres', name: 'Siddende Brystpres', type: 'strength', sets: 3, info: 'Mål: 10-12 reps. Kontrolleret.' },
        { id: 'rygtraek', name: 'Rygtræk m. bryststøtte', type: 'strength', sets: 3, info: 'Mål: 10-12 reps. Støt brystet.' },
        { id: 'traekned', name: 'Træk til bryst (Lat)', type: 'strength', sets: 3, info: 'Mål: 10-12 reps. Sid fast.' },
        { id: 'benstraek', name: 'Benstræk (Leg Ext)', type: 'strength', sets: 3, info: 'Mål: 10-12 reps. Isoler forlåret.' }
    ];

    let currentWeekOffset = 0;

    // --- KALENDER & VÆGT ---
    function toggleDay(id) {
        const el = document.getElementById(id);
        const weights = JSON.parse(localStorage.getItem('weight_logs_V3') || "{}");
        if (!el.classList.contains('active')) {
            const weight = prompt("Vægt i dag? (Valgfrit)");
            if (weight) weights[id] = weight;
            el.classList.add('active');
        } else {
            el.classList.remove('active');
            delete weights[id];
        }
        localStorage.setItem('weight_logs_V3', JSON.stringify(weights));
        setupCalendar();
        saveData();
    }

    function setupCalendar() {
        const grid = document.getElementById('week-grid');
        const now = new Date();
        now.setDate(now.getDate() + (currentWeekOffset * 7));
        document.getElementById('week-display').innerText = "UGE " + getWeekNumber(now);
        const dayNames = ['Man', 'Tir', 'Ons', 'Tor', 'Fre', 'Lør', 'Søn'];
        const monday = new Date(now);
        monday.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1));
        const activeDays = JSON.parse(localStorage.getItem('calendar_V3') || "[]");
        const weights = JSON.parse(localStorage.getItem('weight_logs_V3') || "{}");
        grid.innerHTML = '';
        for(let i=0; i<7; i++) {
            const d = new Date(monday);
            d.setDate(monday.getDate() + i);
            const dateStr = d.toLocaleDateString('da-DK', {day:'2-digit', month:'2-digit'});
            const id = `day_${d.toISOString().split('T')[0]}`;
            const dayBox = document.createElement('div');
            dayBox.className = 'day-box' + (activeDays.includes(id) ? ' active' : '');
            dayBox.id = id;
            const wText = weights[id] ? `<div class="weight-display">${weights[id]}kg</div>` : '';
            dayBox.innerHTML = `<span>${dayNames[i]}</span><span>${dateStr}</span>${wText}<span class="day-check">✓</span>`;
            dayBox.onclick = () => toggleDay(id);
            grid.appendChild(dayBox);
        }
    }

    // --- AI LOGIK (V2.6 FIX TIL STABLE v1) ---
    async function askGemini() {
        const key = (localStorage.getItem('gemini_api_key_V2') || "").trim();
        if (!key || key.length < 10) { alert("Indsæt nøgle i indstillinger."); toggleSettings(); return; }
        const userMsg = document.getElementById('ai_log_input').value;
        if (!userMsg) return;

        const responseBox = document.getElementById('ai-response-box');
        responseBox.style.display = 'block';
        responseBox.innerText = "Forbinder til Gemini (Stable v1)... 🤖";
        responseBox.style.color = "var(--neon-green)";

        // Skifter til den stabile v1 port som Gemini 1.5 Flash nu kræver
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;

        const promptText = `Du er en trænings-coach for Michael (bygningskonstruktør). Svar kort og præcist på dansk. Michaels spørgsmål: ${userMsg}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
            });
            const result = await response.json();
            if (result.error) {
                responseBox.innerText = "GOOGLE SIGER: " + result.error.message;
                responseBox.style.color = "var(--neon-red)";
            } else {
                responseBox.innerText = result.candidates[0].content.parts[0].text;
            }
        } catch (e) { responseBox.innerText = "Forbindelsesfejl. Tjek dit internet."; }
    }

    // --- INDSTILLINGER ---
    function toggleSettings() {
        const s = document.getElementById('settings-area');
        const input = document.getElementById('api_key_input');
        if (s.style.display === 'none') {
            s.style.display = 'block';
            input.value = localStorage.getItem('gemini_api_key_V2') || "";
        } else { s.style.display = 'none'; }
    }
    function saveKey() { localStorage.setItem('gemini_api_key_V2', document.getElementById('api_key_input').value.trim()); showToast("Nøgle Gemt!"); toggleSettings(); }
    function deleteKey() { if(confirm("Slet nøgle?")) { localStorage.removeItem('gemini_api_key_V2'); document.getElementById('api_key_input').value = ""; showToast("Slettet!"); } }

    // --- STANDARD SYSTEM ---
    function getWeekNumber(d) { d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())); d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7)); var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1)); return Math.ceil(((d - yearStart) / 86400000 + 1)/7); }
    function changeWeek(offset) { currentWeekOffset += offset; setupCalendar(); }
    
    let timerInterval;
    function startTimer() {
        clearInterval(timerInterval);
        let btn = document.getElementById('timer-btn');
        let fill = document.getElementById('timer-fill');
        let timeLeft = 90;
        timerInterval = setInterval(() => {
            timeLeft--; btn.innerText = `PAUSE: ${timeLeft} SEK`; fill.style.width = ((90 - timeLeft) / 90 * 100) + "%";
            if(timeLeft <= 0) { clearInterval(timerInterval); btn.innerText = "KLAR!"; fill.style.width = "100%"; }
        }, 1000);
    }

    function toggleInfo(id) { document.getElementById(`${id}_info_box`).classList.toggle('show'); }

    function setStatus(exId, color) {
        ['g','y','r'].forEach(c => { const el = document.getElementById(`${exId}_status_${c}`); if(el) el.className = 'status-btn'; });
        document.getElementById(`${exId}_status_${color.charAt(0)}`).classList.add('active-' + color.charAt(0));
        document.getElementById(`${exId}_status_val`).value = color;
    }

    function renderApp() {
        const container = document.getElementById('workout-container');
        exercises.forEach((ex, index) => {
            const card = document.createElement('div');
            card.className = `exercise-card card-${index % 6}`;
            let content = `
                <div class="card-header">
                    <div class="exercise-name">${index+1}. ${ex.name}</div>
                    <button class="info-btn" onclick="toggleInfo('${ex.id}')">ℹ️ Info</button>
                </div>
                <div class="info-box" id="${ex.id}_info_box">${ex.info}</div>
                <div class="status-group">
                    <button class="status-btn" id="${ex.id}_status_g" onclick="setStatus('${ex.id}', 'green')">🟢 OK</button>
                    <button class="status-btn" id="${ex.id}_status_y" onclick="setStatus('${ex.id}', 'yellow')">🟡 ØM</button>
                    <button class="status-btn" id="${ex.id}_status_r" onclick="setStatus('${ex.id}', 'red')">🔴 AV</button>
                    <input type="hidden" id="${ex.id}_status_val">
                </div>
            `;
            if (ex.type === 'strength') {
                for (let i = 1; i <= 3; i++) {
                    content += `<div class="set-row">
                        <div class="set-inputs"><span>Sæt ${i}</span><div><input type="number" id="${ex.id}_s${i}_kg" placeholder="KG"> x <input type="number" id="${ex.id}_s${i}_reps" placeholder="REPS"></div></div>
                        <div style="font-size:0.7em; color:var(--neon-yellow); margin-top:2px;">>> 10-12 reps | 90s Pause</div>
                    </div>`;
                }
            } else { content += `<div class="set-row"><div class="set-inputs"><span>Tid</span><input type="number" id="${ex.id}_time" placeholder="MIN"></div></div>`; }
            content += `<textarea id="${ex.id}_note" placeholder="Noter..."></textarea><div style="text-align:right; margin-top:10px;">Færdig? <input type="checkbox" id="${ex.id}_check" onchange="updateProgress()"></div>`;
            card.innerHTML = content;
            container.appendChild(card);
        });
        setupCalendar();
        loadData();
    }

    function updateProgress() {
        let done = 0; exercises.forEach(ex => { if(document.getElementById(`${ex.id}_check`).checked) done++; });
        document.getElementById('progress-bar').style.width = (done / exercises.length * 100) + "%";
    }

    function saveData() {
        let activeDays = [];
        document.querySelectorAll('.day-box.active').forEach(db => activeDays.push(db.id));
        localStorage.setItem('calendar_V3', JSON.stringify(activeDays));
        let data = { date: new Date().toLocaleDateString('da-DK'), exercises: {} };
        exercises.forEach(ex => {
            data.exercises[ex.id] = { checked: document.getElementById(`${ex.id}_check`).checked, status: document.getElementById(`${ex.id}_status_val`).value };
        });
        localStorage.setItem('workoutData_V3', JSON.stringify(data));
        showToast("DATA GEMT");
    }

    function loadData() {
        const saved = localStorage.getItem('workoutData_V3');
        if (!saved) return;
        const data = JSON.parse(saved);
        exercises.forEach(ex => {
            const ed = data.exercises[ex.id];
            if(ed) {
                document.getElementById(`${ex.id}_check`).checked = ed.checked;
                if(ed.status) setStatus(ex.id, ed.status);
            }
        });
        updateProgress();
    }

    function exportData() { saveData(); showToast("KOPIERET"); }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.className = "show"; setTimeout(() => t.className = "", 2000); }

    window.onload = () => { renderApp(); };
</script>
</body>
</html>
