<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness Master 3000 - Din Træning</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <style>
        :root {
            --bg-color: #0d1117; 
            --card-bg: #161b22;  
            --text-color: #e6edf3;
            --muted-text: #8b949e;
            
            --neon-green: #39ff14;
            --neon-cyan: #00ffff;
            --neon-purple: #9d00ff;
            --neon-orange: #ff8c00;
            --neon-yellow: #ffff00;
            
            --retro-shadow: 6px 6px 0px rgba(0,0,0,0.8);
            
            --font-family: 'Courier New', Courier, monospace;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            padding-bottom: 160px; 
            box-sizing: border-box;
            font-weight: bold;
            font-size: 16px;
        }

        h1 {
            text-align: center;
            color: var(--neon-green);
            text-transform: uppercase;
            text-shadow: 0 0 5px var(--neon-green);
            font-size: 1.6em;
            margin-top: 10px;
            letter-spacing: 1px;
        }
        
        .header-info {
            text-align: center;
            font-size: 0.9em;
            color: var(--muted-text);
            margin-bottom: 20px;
        }

        #progress-container {
            width: 100%;
            background-color: #000;
            border: 2px solid var(--muted-text);
            height: 12px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            transition: width 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .exercise-card {
            background-color: var(--card-bg);
            border-radius: 4px; 
            padding: 15px;
            margin-bottom: 20px;
            border-left: 6px solid var(--muted-text); 
            box-shadow: var(--retro-shadow);
        }
        
        .card-0 { border-color: var(--neon-cyan); }   
        .card-1 { border-color: var(--neon-green); }  
        .card-2 { border-color: var(--neon-green); }  
        .card-3 { border-color: var(--neon-purple); } 
        .card-4 { border-color: var(--neon-purple); } 

        .exercise-title {
            font-size: 1.1em;
            text-transform: uppercase;
            color: var(--text-color);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.5px;
        }
        
        .exercise-note-header {
            font-size: 0.85em;
            color: var(--muted-text);
            margin-top: -5px;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .target-reps {
            font-size: 0.85em;
            color: var(--neon-yellow);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-shadow: 0 0 2px rgba(255,255,0,0.5);
        }

        .set-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.95em;
        }
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        input[type="number"] {
            width: 75px;
            padding: 10px;
            background-color: #000;
            border: 2px solid var(--muted-text);
            color: var(--neon-yellow);
            border-radius: 4px;
            font-size: 16px; 
            font-weight: bold;
            text-align: center;
            font-family: var(--font-family);
        }
        input[type="number"]:focus {
            border-color: var(--neon-green);
            outline: none;
            box-shadow: 0 0 5px var(--neon-green);
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            background-color: #000;
            border: 2px solid var(--muted-text);
            color: var(--text-color);
            border-radius: 4px;
            margin-top: 10px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.9em;
            font-weight: bold;
        }
        textarea:focus {
            border-color: var(--neon-green);
            outline: none;
        }

        .check-container {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted-text);
            font-size: 0.95em;
            margin-top: 15px;
            justify-content: flex-end;
        }
        input[type="checkbox"] {
            transform: scale(1.5);
            cursor: pointer;
            accent-color: var(--neon-cyan);
        }

        .bottom-fixed-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--bg-color);
            padding: 15px;
            border-top: 3px solid var(--muted-text);
            box-sizing: border-box;
            z-index: 100;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 12px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-family: var(--font-family);
            box-shadow: var(--retro-shadow);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        button:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px rgba(0,0,0,0.8);
        }

        .btn-save { 
            background-color: #000;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
        }
        .btn-export { 
            background-color: var(--neon-purple);
            color: #fff;
        }

        #version-info {
            text-align: center;
            font-size: 0.8em;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: var(--neon-cyan);
            color: #000;
            text-align: center;
            border-radius: 4px;
            padding: 16px;
            position: fixed;
            z-index: 200;
            left: 50%;
            bottom: 130px;
            transform: translateX(-50%);
            font-weight: bold;
            font-size: 1em;
            text-transform: uppercase;
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        #toast.show { visibility: visible; animation: fadein 0.3s, fadeout 0.3s 2.7s; }
        @keyframes fadein { from {bottom: 100px; opacity: 0;} to {bottom: 130px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 130px; opacity: 1;} to {bottom: 100px; opacity: 0;} }
    </style>
</head>
<body>

    <h1>Fitness Master 3000</h1>
    <div class="header-info">Fokus: Skån ryg/haleben. Kontrollerede træk.</div>
    
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="workout-container">
        </div>

    <div class="bottom-fixed-container">
        <div class="btn-container">
            <button class="btn-save" onclick="saveData()">[Gem Data]</button>
            <button class="btn-export" onclick="exportData()">[Send til Træner]</button>
        </div>
        <div id="version-info">
            Henter versionsdata...
        </div>
    </div>

    <div id="toast">SYSTEM: DATA GEMT!</div>

<script>
    const exercises = [
        // Her er den nye, præcise tekst til løbebåndet
        { id: 'cardio', name: 'Løbebånd (Varme)', type: 'cardio', note: '5 min gang. Derefter: 1 min løb / 2 min gang (x 3-4). Nedkøl: 5 min gang.' },
        { id: 'benpres', name: 'Siddende Benpres', type: 'strength', sets: 3, targetReps: '10-12' },
        { id: 'benstraek', name: 'Benstræk (Leg Ext)', type: 'strength', sets: 3, targetReps: '10-12' },
        { id: 'brystpres', name: 'Siddende Brystpres', type: 'strength', sets: 3, targetReps: '10-12' },
        { id: 'rygtraek', name: 'Rygtræk m. plade', type: 'strength', sets: 3, targetReps: '10-12' },
        { id: 'traekned', name: 'Træk til bryst (Lat)', type: 'strength', sets: 3, targetReps: '10-12' }
    ];

    const container = document.getElementById('workout-container');

    function renderApp() {
        exercises.forEach((ex, index) => {
            const card = document.createElement('div');
            card.className = `exercise-card card-${index}`;
            
            let html = `
                <div class="exercise-title">
                    <span>${index + 1}. ${ex.name}</span>
                </div>
            `;
            
            if (ex.note) {
                html += `<div class="exercise-note-header">${ex.note}</div>`;
            }

            if (ex.type === 'strength' && ex.targetReps) {
                html += `<div class="target-reps">>> Mål: ${ex.targetReps} reps</div>`;
            }
            
            if (ex.type === 'cardio') {
                html += `
                    <div class="set-row">
                        <label>Tid (min):</label>
                        <input type="number" id="${ex.id}_time" placeholder="0" oninput="updateProgress()">
                    </div>
                `;
            } else {
                for (let i = 1; i <= ex.sets; i++) {
                    html += `
                        <div class="set-row">
                            <label>Sæt ${i}:</label>
                            <div class="input-group">
                                <input type="number" id="${ex.id}_s${i}_kg" placeholder="0" oninput="updateProgress()"> <span>kg</span>
                                <input type="number" id="${ex.id}_s${i}_reps" placeholder="0" oninput="updateProgress()"> <span>reps</span>
                            </div>
                        </div>
                    `;
                }
            }
            
            html += `<textarea id="${ex.id}_note" rows="2" placeholder="Noter om form eller smerte..." oninput="updateProgress()"></textarea>`;
            
            html += `
                <div class="check-container">
                    <label for="${ex.id}_check">Færdig?</label>
                    <input type="checkbox" id="${ex.id}_check" onchange="updateProgress()">
                </div>
            `;

            card.innerHTML = html;
            container.appendChild(card);
        });

        loadData();
    }

    function updateProgress() {
        const totalChecks = exercises.length;
        let filledChecks = 0;
        exercises.forEach(ex => {
            if(document.getElementById(`${ex.id}_check`).checked) filledChecks++;
        });

        const percentage = totalChecks > 0 ? (filledChecks / totalChecks) * 100 : 0;
        const progressBar = document.getElementById('progress-bar');
        
        progressBar.style.width = percentage + '%';
        
        if (percentage === 100) {
            progressBar.style.backgroundColor = "#39ff14";
            progressBar.style.boxShadow = "0 0 10px #39ff14";
        } else {
            progressBar.style.backgroundColor = "#00ffff";
            progressBar.style.boxShadow = "0 0 10px #00ffff";
        }
    }

    function saveData() {
        let data = { 
            date: new Date().toLocaleDateString('da-DK'),
            timestamp: new Date().toISOString()
        };
        
        exercises.forEach(ex => {
            data[ex.id] = { 
                note: document.getElementById(`${ex.id}_note`).value,
                checked: document.getElementById(`${ex.id}_check`).checked
            };
            
            if (ex.type === 'cardio') {
                data[ex.id].time = document.getElementById(`${ex.id}_time`).value;
            } else {
                let setsData = [];
                for (let i = 1; i <= ex.sets; i++) {
                    setsData.push({
                        kg: document.getElementById(`${ex.id}_s${i}_kg`).value,
                        reps: document.getElementById(`${ex.id}_s${i}_reps`).value
                    });
                }
                data[ex.id].sets = setsData;
            }
        });

        localStorage.setItem('workoutData_V1_2', JSON.stringify(data));
        showToast("DATA GEMT LOKALT!");
    }

    function loadData() {
        const saved = localStorage.getItem('workoutData_V1_2');
        if (saved) {
            const data = JSON.parse(saved);
            exercises.forEach(ex => {
                if (data[ex.id]) {
                    document.getElementById(`${ex.id}_note`).value = data[ex.id].note || '';
                    document.getElementById(`${ex.id}_check`).checked = data[ex.id].checked || false;
                    
                    if (ex.type === 'cardio' && data[ex.id].time) {
                        document.getElementById(`${ex.id}_time`).value = data[ex.id].time;
                    } else if (ex.type === 'strength' && data[ex.id].sets) {
                        data[ex.id].sets.forEach((set, index) => {
                            let i = index + 1;
                            document.getElementById(`${ex.id}_s${i}_kg`).value = set.kg || '';
                            document.getElementById(`${ex.id}_s${i}_reps`).value = set.reps || '';
                        });
                    }
                }
            });
        }
        updateProgress();
    }

    function exportData() {
        saveData(); 
        let data = JSON.parse(localStorage.getItem('workoutData_V1_2'));
        let exportText = `SYSTEM LOG - Fuldkrop (${data.date}):\n--------------------------\n\n`;
        
        exercises.forEach((ex, index) => {
            let exData = data[ex.id];
            exportText += `🏋️‍♂️ ${index + 1}. ${ex.name.toUpperCase()}\n`;
            
            if (ex.type === 'cardio') {
                exportText += `   > Tid: ${exData.time ? exData.time + ' min' : 'Ej registreret'}\n`;
            } else {
                let setsExported = 0;
                exData.sets.forEach((set, setIndex) => {
                    if(set.kg || set.reps) {
                        exportText += `   > Sæt ${setIndex + 1}: ${set.kg || 0} kg x ${set.reps || 0} reps\n`;
                        setsExported++;
                    }
                });
                if(setsExported === 0) exportText += `   > Ingen løft registreret.\n`;
            }
            if (exData.checked) exportText += `   > [FÆRDIG]\n`;
            if (exData.note) {
                exportText += `   > Noter: "${exData.note}"\n`;
            }
            exportText += `\n`;
        });
        
        exportText += `--------------------------\n`;
        exportText += `Energi / Noter til træner:\n[]`;

        navigator.clipboard.writeText(exportText).then(() => {
            showToast("DATA KLAR I UDKLIPSHOLDER!");
        }).catch(err => {
            alert('Kunne ikke kopiere. Prøv at trykke Gem og Send igen.');
        });
    }

    function showToast(message) {
        var x = document.getElementById("toast");
        x.innerText = message;
        x.className = "show";
        setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
    }

    async function fetchLatestVersion() {
        const githubUsername = 'MichaelKHans'; 
        const repoName = 'traenings-app'; 
        const repoUrl = `https://api.github.com/repos/${githubUsername}/${repoName}/commits?per_page=1`;
        
        try {
            const response = await fetch(repoUrl);
            if (!response.ok) throw new Error('Repo not found');
            const data = await response.json();
            
            if (data && data.length > 0) {
                const commitDate = new Date(data[0].commit.author.date);
                const formattedDate = commitDate.toLocaleDateString('da-DK', { day: 'numeric', month: 'short' }) + 
                                      ' kl. ' + 
                                      commitDate.toLocaleTimeString('da-DK', { hour: '2-digit', minute:'2-digit' });
                document.getElementById('version-info').innerText = 'System V1.2 | Opdateret ' + formattedDate;
            }
        } catch (error) {
            document.getElementById('version-info').innerText = 'System V1.2 | Offline version';
        }
    }

    window.onload = function() {
        renderApp();
        fetchLatestVersion(); 
    };

</script>
</body>
</html>
