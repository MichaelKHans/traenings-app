<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness Master 4.1 - Michael Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #0d1117; --card-bg: #161b22; --text-color: #e6edf3; --muted-text: #8b949e;
            --neon-green: #39ff14; --neon-cyan: #00ffff; --neon-purple: #9d00ff;
            --neon-orange: #ff8c00; --neon-yellow: #ffff00; --neon-red: #ff003c;
            --retro-shadow: 6px 6px 0px rgba(0,0,0,0.8);
            --font-family: 'Courier New', Courier, monospace;
        }

        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; padding-bottom: 220px; box-sizing: border-box; font-weight: bold; }
        
        h1 { text-align: center; color: var(--neon-green); text-transform: uppercase; text-shadow: 0 0 10px var(--neon-green); font-size: 1.5em; margin-bottom: 20px; }

        /* Kalender */
        .calendar-container { background-color: #000; border: 2px solid var(--neon-purple); padding: 10px; margin-bottom: 20px; border-radius: 4px; box-shadow: 4px 4px 0px var(--neon-purple); }
        .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-box { display: flex; flex-direction: column; align-items: center; padding: 8px 0; border: 1px solid #333; border-radius: 4px; cursor: pointer; font-size: 0.6em; background: #111; min-height: 65px; justify-content: space-between; }
        .day-box.active { border-color: var(--neon-green); background-color: rgba(57, 255, 20, 0.1); color: var(--neon-green); }
        .day-box.is-today { border: 2px solid var(--neon-orange) !important; box-shadow: 0 0 8px var(--neon-orange); }
        .weight-display { color: var(--neon-yellow); font-size: 0.9em; font-weight: bold; }

        /* Graf */
        .chart-container { background: #000; border: 2px solid var(--neon-cyan); padding: 10px; margin-bottom: 25px; border-radius: 4px; height: 180px; }

        /* Øvelseskort med GLOW */
        .exercise-card { background-color: var(--card-bg); padding: 15px; margin-bottom: 25px; border-left: 10px solid var(--muted-text); box-shadow: var(--retro-shadow); position: relative; }
        .exercise-name { font-size: 1.1em; text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        .card-0 { border-left-color: var(--neon-cyan) !important; } .card-0 .exercise-name { color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan); }
        .card-1 { border-left-color: var(--neon-green) !important; } .card-1 .exercise-name { color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); }
        .card-2 { border-left-color: var(--neon-purple) !important; } .card-2 .exercise-name { color: var(--neon-purple); text-shadow: 0 0 8px var(--neon-purple); }
        .card-3 { border-left-color: var(--neon-orange) !important; } .card-3 .exercise-name { color: var(--neon-orange); text-shadow: 0 0 8px var(--neon-orange); }
        .card-4 { border-left-color: var(--neon-yellow) !important; } .card-4 .exercise-name { color: var(--neon-yellow); text-shadow: 0 0 8px var(--neon-yellow); }
        .card-5 { border-left-color: var(--neon-red) !important; } .card-5 .exercise-name { color: var(--neon-red); text-shadow: 0 0 8px var(--neon-red); }

        .info-btn { background: #000; color: #fff; border: 1px solid #555; padding: 5px 10px; font-size: 0.7em; cursor: pointer; font-family: inherit; border-radius: 3px; }
        .info-box { display: none; background-color: #000; border: 1px solid var(--neon-cyan); padding: 12px; margin: 10px 0; font-size: 0.8em; color: var(--text-color); line-height: 1.5; border-radius: 4px; }
        .info-box.show { display: block; }

        .status-group { display: flex; gap: 5px; margin-bottom: 15px; }
        .status-btn { flex: 1; background-color: #000; border: 1px solid var(--muted-text); color: var(--muted-text); padding: 10px 0; font-family: inherit; font-size: 0.7em; font-weight: bold; cursor: pointer; }
        .active-g { border-color: var(--neon-green) !important; color: var(--neon-green) !important; box-shadow: inset 0 0 5px var(--neon-green); }
        .active-y { border-color: var(--neon-yellow) !important; color: var(--neon-yellow) !important; box-shadow: inset 0 0 5px var(--neon-yellow); }
        .active-r { border-color: var(--neon-red) !important; color: var(--neon-red) !important; box-shadow: inset 0 0 5px var(--neon-red); }

        input[type="number"], input[type="text"] { padding: 10px; background-color: #000; border: 2px solid var(--muted-text); color: var(--neon-yellow); text-align: center; font-family: inherit; font-size: 16px; border-radius: 4px; }
        textarea { width: 100%; padding: 10px; background-color: #000; border: 1px solid var(--muted-text); color: #fff; margin-top: 8px; font-family: inherit; box-sizing: border-box; border-radius: 4px; }

        /* AI SEKTION */
        .ai-log-section { background-color: #000; border: 2px solid var(--neon-cyan); padding: 15px; margin-bottom: 20px; box-shadow: 4px 4px 0px var(--neon-cyan); }
        #ai-response-box { display: none; background-color: #111; border: 1px solid var(--neon-green); padding: 15px; margin-top: 15px; color: var(--neon-green); font-size: 0.9em; line-height: 1.6; border-radius: 4px; }
        .btn-ai-inline { background: var(--neon-cyan); color: #000; border: none; padding: 12px; width: 100%; margin-top: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; font-family: inherit; border-radius: 4px; }

        /* FIXED BUND-BAR */
        .bottom-fixed-container { position: fixed; bottom: 0; left: 0; width: 100%; background-color: rgba(13, 17, 23, 0.95); padding: 12px; border-top: 2px solid #333; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.8); box-sizing: border-box; }
        .footer-flex { display: flex; justify-content: space-between; align-items: center; gap: 10px; max-width: 600px; margin: 0 auto; }
        
        .btn-save-bottom { background: #000; color: var(--neon-green); border: 2px solid var(--neon-green); flex: 1; padding: 15px; font-weight: bold; text-transform: uppercase; cursor: pointer; font-family: inherit; border-radius: 4px; }
        
        /* TIMER KONTROL I BUND */
        .timer-control-box { flex: 1.5; display: flex; flex-direction: column; gap: 5px; }
        .timer-btn-main { background: var(--neon-orange); color: #000; border: none; padding: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; font-family: inherit; border-radius: 4px; font-size: 0.85em; width: 100%; }
        .timer-input-row { display: flex; align-items: center; justify-content: center; gap: 5px; }
        .timer-sec-input { width: 50px !important; padding: 5px !important; font-size: 12px !important; background: #000; color: var(--neon-orange) !important; border-color: var(--neon-orange) !important; }

        #toast { visibility: hidden; position: fixed; left: 50%; bottom: 200px; transform: translateX(-50%); background: var(--neon-green); color: #000; padding: 12px 25px; font-weight: bold; z-index: 2000; text-transform: uppercase; border-radius: 50px; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

    <h1>Fitness Master 4.1</h1>
    
    <div class="calendar-container">
        <div class="week-grid" id="week-grid"></div>
    </div>

    <div class="chart-container">
        <canvas id="weightChart"></canvas>
    </div>

    <div id="progress-container" style="width:100%; height:8px; background:#222; margin-bottom:20px; border-radius:10px; overflow:hidden;">
        <div id="progress-bar" style="width:0%; height:100%; background:var(--neon-cyan); transition:0.5s;"></div>
    </div>

    <div id="workout-container"></div>

    <div class="ai-log-section">
        <div style="color:var(--neon-cyan); font-size:0.85em; text-transform:uppercase; margin-bottom:10px; letter-spacing:1px;">🤖 AI Coach Sparring</div>
        <textarea id="ai_log_input" rows="3" placeholder="Skriv dit spørgsmål her..."></textarea>
        <button class="btn-ai-inline" onclick="askGemini()">[ Spørg Gemini ]</button>
        <div id="ai-response-box"></div>
    </div>

    <div class="bottom-fixed-container">
        <div class="footer-flex">
            <button class="btn-save-bottom" onclick="saveData()">Gem Log</button>
            
            <div class="timer-control-box">
                <button class="timer-btn-main" id="timer-btn" onclick="startTimer()">Start Pause</button>
                <div class="timer-input-row">
                    <input type="number" id="pause_duration" class="timer-sec-input" value="90">
                    <span style="font-size: 0.6em; color: var(--neon-orange);">SEK</span>
                </div>
            </div>
        </div>
        <div style="text-align:center; font-size:0.6em; color:#444; margin-top:8px;" onclick="toggleSettings()">Indstillinger ⚙️</div>
        
        <div id="settings-area" style="display:none; padding-top:10px;">
            <input type="text" id="api_key_input" style="width:100%; margin-bottom:5px;" placeholder="Indsæt AI nøgle...">
            <button class="btn-save-bottom" style="padding:5px; width:100%;" onclick="saveKey()">Gem Nøgle</button>
        </div>
    </div>

    <div id="toast">DATA GEMT</div>

<script>
    const exercises = [
        { id: 'cardio', name: '1. Løbebånd (Varme)', type: 'cardio', info: '<b>Opvarmning:</b> Start med 2 min gang (5 km/t). Kør derefter 1 min let løb og 2 min gang. Gentag 3-4 gange. <br><br><b>Konstruktør-tip:</b> Ved haleben-smerte, øg incline til 3-5% og gå raskt – det mindsker stød i ryggen.' },
        { id: 'benpres', name: '2. Siddende Benpres', type: 'strength', info: '<b>Teknik:</b> Fødderne i hoftebredde. Pres kontrolleret ud uden at låse knæene. <br><br><b>Sikkerhed:</b> Pres lænden HELT ind i ryglænet. Meget sikker for halebenet.' },
        { id: 'brystpres', name: '3. Siddende Brystpres', type: 'strength', info: '<b>Teknik:</b> Albuer lidt lavere end skuldre. Pres frem til næsten strakte arme. <br><br><b>Haleben:</b> Sid helt oprejst.' },
        { id: 'rygtraek', name: '4. Rygtræk (Chest Supported)', type: 'strength', info: '<b>Teknik:</b> Pres bryst mod pladen. Klem skulderbladene sammen. <br><br><b>Vigtigt:</b> Bryststøtten sikrer, at du ikke belaster ryggen/halebenet.' },
        { id: 'traekned', name: '5. Træk til bryst (Lat)', type: 'strength', info: '<b>Teknik:</b> Træk stangen til øvre bryst. Læn dig kun minimalt tilbage. <br><br><b>Fokus:</b> Træk med albuerne.' },
        { id: 'benstraek', name: '6. Benstræk (Leg Ext)', type: 'strength', info: '<b>Teknik:</b> Sid helt tilbage. Isoler forsiden af låret uden rygsmerter.' }
    ];

    let weightChart;
    let timerInterval;

    // --- TIMER LOGIK ---
    function startTimer() {
        clearInterval(timerInterval);
        const btn = document.getElementById('timer-btn');
        let timeLeft = parseInt(document.getElementById('pause_duration').value);
        
        timerInterval = setInterval(() => {
            timeLeft--;
            btn.innerText = `${timeLeft}s PAUSE`;
            btn.style.background = "#ffcc00"; // Skift farve mens den tæller ned
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                btn.innerText = "KLAR!";
                btn.style.background = var(--neon-green);
                new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
            }
        }, 1000);
    }

    // --- KALENDER & GRAF ---
    function setupCalendar() {
        const grid = document.getElementById('week-grid');
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];
        const monday = new Date(now);
        monday.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1));
        const activeDays = JSON.parse(localStorage.getItem('calendar_V3') || "[]");
        const weights = JSON.parse(localStorage.getItem('weight_logs_V3') || "{}");
        grid.innerHTML = '';
        const dayNames = ['Man', 'Tir', 'Ons', 'Tor', 'Fre', 'Lør', 'Søn'];
        for(let i=0; i<7; i++) {
            const d = new Date(monday); d.setDate(monday.getDate() + i);
            const dStr = d.toISOString().split('T')[0];
            const isToday = dStr === todayStr;
            const id = `day_${dStr}`;
            const dayBox = document.createElement('div');
            dayBox.className = 'day-box' + (activeDays.includes(id) ? ' active' : '') + (isToday ? ' is-today' : '');
            const wText = weights[id] ? `<div class="weight-display">${weights[id]}kg</div>` : '';
            dayBox.innerHTML = `<span>${dayNames[i]}</span><span style="opacity:0.6">${d.getDate()}/${d.getMonth()+1}</span>${wText}`;
            dayBox.onclick = () => toggleDay(id);
            grid.appendChild(dayBox);
        }
    }

    function toggleDay(id) {
        const weights = JSON.parse(localStorage.getItem('weight_logs_V3') || "{}");
        const activeDays = JSON.parse(localStorage.getItem('calendar_V3') || "[]");
        if (!activeDays.includes(id)) {
            const weight = prompt("Indtast vægt (kg):");
            if (weight) { weights[id] = weight; activeDays.push(id); }
        } else { if(confirm("Slet log?")) { activeDays.splice(activeDays.indexOf(id), 1); delete weights[id]; } }
        localStorage.setItem('weight_logs_V3', JSON.stringify(weights));
        localStorage.setItem('calendar_V3', JSON.stringify(activeDays));
        setupCalendar(); updateChart();
    }

    function updateChart() {
        const weights = JSON.parse(localStorage.getItem('weight_logs_V3') || "{}");
        const sortedDates = Object.keys(weights).sort().slice(-7);
        const dataValues = sortedDates.map(d => weights[d]);
        const labels = sortedDates.map(d => d.split('-').reverse().slice(0,2).join('/'));
        if (weightChart) weightChart.destroy();
        const ctx = document.getElementById('weightChart').getContext('2d');
        weightChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ label: 'Vægt', data: dataValues, borderColor: '#00ffff', backgroundColor: 'rgba(0, 255, 255, 0.1)', borderWidth: 3, tension: 0.4, fill: true }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#222' } }, x: { grid: { display: false } } } }
        });
    }

    // --- AI LOGIK (MED HISTORIK) ---
    async function askGemini() {
        const key = (localStorage.getItem('gemini_api_key_V2') || "").trim();
        if (!key) { alert("Sæt nøgle i indstillinger!"); return; }
        const userMsg = document.getElementById('ai_log_input').value;
        if (!userMsg) return;
        const responseBox = document.getElementById('ai-response-box');
        responseBox.style.display = 'block';
        responseBox.innerText = "Michael, jeg analyserer din profil... 🤖";
        const weights = JSON.parse(localStorage.getItem('weight_logs_V3') || "{}");
        const lastWeight = Object.values(weights).pop() || "85";
        const context = `Du er træner for Michael (bygningskonstruktør, haleben-skade). Vægt: ${lastWeight}kg. Svar kort og præcist på: "${userMsg}"`;
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${key}`;
        try {
            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: context }] }] }) });
            const result = await response.json();
            responseBox.innerText = result.candidates[0].content.parts[0].text;
            responseBox.style.color = "var(--neon-green)";
        } catch (e) { responseBox.innerText = "Fejl i forbindelsen."; }
    }

    // --- RENDER APP ---
    function toggleInfo(id) { document.getElementById(`${id}_info`).classList.toggle('show'); }
    function setStatus(exId, color) { ['g','y','r'].forEach(c => document.getElementById(`${exId}_status_${c}`).className = 'status-btn'); document.getElementById(`${exId}_status_${color.charAt(0)}`).classList.add('active-' + color.charAt(0)); document.getElementById(`${exId}_status_val`).value = color; }

    function renderApp() {
        const container = document.getElementById('workout-container');
        exercises.forEach((ex, index) => {
            const card = document.createElement('div');
            card.className = `exercise-card card-${index % 6}`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="exercise-name">${ex.name}</span>
                    <button class="info-btn" onclick="toggleInfo('${ex.id}')">INFO</button>
                </div>
                <div class="info-box" id="${ex.id}_info">${ex.info}</div>
                <div class="status-group">
                    <button class="status-btn" id="${ex.id}_status_g" onclick="setStatus('${ex.id}', 'green')">OK</button>
                    <button class="status-btn" id="${ex.id}_status_y" onclick="setStatus('${ex.id}', 'yellow')">ØM</button>
                    <button class="status-btn" id="${ex.id}_status_r" onclick="setStatus('${ex.id}', 'red')">AV</button>
                    <input type="hidden" id="${ex.id}_status_val">
                </div>
                <div style="display:flex; gap:10px; align-items:center;">
                    ${ex.type === 'strength' ? `<input type="number" id="${ex.id}_kg" placeholder="KG"> x <input type="number" id="${ex.id}_reps" placeholder="REPS">` : `<input type="number" id="${ex.id}_time" style="width:100px" placeholder="MIN">`}
                    <div style="margin-left:auto;">Færdig? <input type="checkbox" id="${ex.id}_check" onchange="updateProgress()"></div>
                </div>
            `;
            container.appendChild(card);
        });
        setupCalendar(); updateChart(); loadData();
    }

    function updateProgress() { let done = 0; exercises.forEach(ex => { if(document.getElementById(`${ex.id}_check`).checked) done++; }); document.getElementById('progress-bar').style.width = (done / exercises.length * 100) + "%"; }
    function saveData() { let data = { date: new Date().toLocaleDateString(), exercises: {} }; exercises.forEach(ex => { data.exercises[ex.id] = { checked: document.getElementById(`${ex.id}_check`).checked, status: document.getElementById(`${ex.id}_status_val`).value, kg: ex.type === 'strength' ? document.getElementById(`${ex.id}_kg`).value : null, reps: ex.type === 'strength' ? document.getElementById(`${ex.id}_reps`).value : null, time: ex.type === 'cardio' ? document.getElementById(`${ex.id}_time`).value : null }; }); localStorage.setItem('workoutData_V4', JSON.stringify(data)); showToast("TRÆNING GEMT!"); }
    function loadData() { const saved = localStorage.getItem('workoutData_V4'); if (!saved) return; const data = JSON.parse(saved); if(data.date !== new Date().toLocaleDateString()) return; exercises.forEach(ex => { const ed = data.exercises[ex.id]; if(ed) { document.getElementById(`${ex.id}_check`).checked = ed.checked; if(ed.status) setStatus(ex.id, ed.status); if(ex.type === 'strength') { document.getElementById(`${ex.id}_kg`).value = ed.kg; document.getElementById(`${ex.id}_reps`).value = ed.reps; } else { document.getElementById(`${ex.id}_time`).value = ed.time; } } }); updateProgress(); }
    function toggleSettings() { const s = document.getElementById('settings-area'); s.style.display = s.style.display === 'none' ? 'block' : 'none'; }
    function saveKey() { localStorage.setItem('gemini_api_key_V2', document.getElementById('api_key_input').value.trim()); showToast("Nøgle Gemt!"); toggleSettings(); }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.className = "show"; setTimeout(() => t.className = "", 2500); }

    window.onload = renderApp;
</script>
</body>
</html>
