<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness Master 3000 - V1.7</title>
    
    <style>
        :root {
            --bg-color: #0d1117; 
            --card-bg: #161b22;  
            --text-color: #e6edf3;
            --muted-text: #8b949e;
            --neon-green: #39ff14;
            --neon-cyan: #00ffff;
            --neon-purple: #9d00ff;
            --neon-orange: #ff8c00;
            --neon-yellow: #ffff00;
            --neon-red: #ff003c;
            --retro-shadow: 6px 6px 0px rgba(0,0,0,0.8);
            --font-family: 'Courier New', Courier, monospace;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            padding-bottom: 240px; 
            box-sizing: border-box;
            font-weight: bold;
        }

        h1 { text-align: center; color: var(--neon-green); text-transform: uppercase; text-shadow: 0 0 5px var(--neon-green); font-size: 1.5em; margin-bottom: 10px; }
        
        /* Coach Fokus Boks */
        .coach-focus-box {
            background-color: rgba(255, 140, 0, 0.1);
            border: 2px solid var(--neon-orange);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.8);
        }
        .coach-focus-title { color: var(--neon-orange); font-size: 0.8em; text-transform: uppercase; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }

        /* Kalender */
        .calendar-container { background-color: #000; border: 2px solid var(--neon-purple); padding: 10px; margin-bottom: 20px; border-radius: 4px; box-shadow: 4px 4px 0px var(--neon-purple); }
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; color: var(--neon-purple); margin-bottom: 10px; text-transform: uppercase; font-size: 0.9em; }
        .nav-btn { background: #111; border: 1px solid var(--neon-purple); color: var(--neon-purple); padding: 5px 15px; cursor: pointer; font-family: inherit; }
        .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-box { display: flex; flex-direction: column; align-items: center; padding: 5px 0; border: 1px solid #333; border-radius: 4px; cursor: pointer; font-size: 0.65em; background: #111; }
        .day-box.active { border-color: var(--neon-green); background-color: rgba(57, 255, 20, 0.1); color: var(--neon-green); }
        .day-check { font-size: 1.1em; visibility: hidden; }
        .day-box.active .day-check { visibility: visible; }

        #progress-container { width: 100%; background-color: #000; border: 2px solid var(--muted-text); height: 12px; margin-bottom: 15px; }
        #progress-bar { width: 0%; height: 100%; background-color: var(--neon-cyan); transition: all 0.3s ease; }

        .timer-container { margin-bottom: 25px; text-align: center; }
        .timer-btn { background-color: #000; color: var(--neon-orange); border: 2px solid var(--neon-orange); padding: 10px; width: 100%; font-family: inherit; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .timer-bar-bg { width: 100%; height: 8px; background-color: #000; border: 1px solid var(--muted-text); margin-top: 5px; }
        .timer-bar-fill { width: 0%; height: 100%; background-color: var(--neon-orange); transition: width 1s linear; }

        /* Øvelseskort */
        .exercise-card { background-color: var(--card-bg); padding: 15px; margin-bottom: 25px; border-left: 6px solid var(--muted-text); box-shadow: var(--retro-shadow); position: relative; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .info-btn { background: #000; color: var(--neon-cyan); border: 1px solid var(--neon-cyan); padding: 4px 8px; font-size: 0.7em; cursor: pointer; font-family: inherit; text-transform: uppercase; }

        /* Info Boks Justeret */
        .info-box { display: none; background-color: #000; border: 1px solid var(--neon-cyan); padding: 12px; margin: 10px 0; font-size: 0.85em; color: var(--text-color); line-height: 1.4; }
        .info-box.show { display: block; }
        .coach-adjustment { border-top: 1px dashed var(--neon-orange); margin-top: 10px; padding-top: 10px; color: var(--neon-orange); }
        .coach-adjustment strong { color: var(--neon-orange); text-shadow: 0 0 3px var(--neon-orange); }

        .status-group { display: flex; gap: 5px; margin-bottom: 15px; }
        .status-btn { flex: 1; background-color: #000; border: 1px solid var(--muted-text); color: var(--muted-text); padding: 8px 0; font-family: inherit; font-size: 0.75em; font-weight: bold; cursor: pointer; }
        .active-g { border-color: var(--neon-green) !important; color: var(--neon-green) !important; }
        .active-y { border-color: var(--neon-yellow) !important; color: var(--neon-yellow) !important; }
        .active-r { border-color: var(--neon-red) !important; color: var(--neon-red) !important; }

        .set-row { margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .set-inputs { display: flex; align-items: center; justify-content: space-between; }
        .pause-reminder { font-size: 0.7em; color: var(--neon-yellow); margin-top: 5px; text-transform: uppercase; }
        .ghost-text { font-size: 0.7em; color: var(--muted-text); font-style: italic; margin-top: 2px; }
        
        input[type="number"] { width: 65px; padding: 8px; background-color: #000; border: 2px solid var(--muted-text); color: var(--neon-yellow); text-align: center; font-family: inherit; font-size: 16px; }
        textarea { width: 100%; padding: 10px; background-color: #000; border: 1px solid var(--muted-text); color: #fff; margin-top: 5px; font-family: inherit; box-sizing: border-box; }

        .ai-log-section { background-color: #000; border: 2px solid var(--neon-cyan); padding: 15px; margin-bottom: 20px; box-shadow: 4px 4px 0px var(--neon-cyan); }
        .ai-log-title { color: var(--neon-cyan); font-size: 0.8em; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }

        .bottom-fixed-container { position: fixed; bottom: 0; left: 0; width: 100%; background-color: var(--bg-color); padding: 15px; border-top: 2px solid #333; z-index: 1000; }
        .btn-container { display: flex; gap: 10px; }
        button.action-btn { flex: 1; padding: 15px; font-weight: bold; text-transform: uppercase; cursor: pointer; font-family: inherit; border-radius: 4px; }
        .btn-save { background: #000; color: var(--neon-green); border: 2px solid var(--neon-green); }
        .btn-export { background: var(--neon-purple); color: #fff; border: none; }
        #version-info { text-align: center; font-size: 0.7em; color: #555; margin-top: 10px; }

        #toast { visibility: hidden; position: fixed; left: 50%; bottom: 180px; transform: translateX(-50%); background: var(--neon-cyan); color: #000; padding: 10px 20px; font-weight: bold; z-index: 2000; text-transform: uppercase; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

    <h1>Fitness Master</h1>

    <div class="coach-focus-box">
        <div class="coach-focus-title"><span>⚠️</span> AKTIVE JUSTERINGER:</div>
        <div id="global-coach-advice" style="font-size: 0.85em; line-height: 1.4;">
            Velkommen til V1.7. Her vil jeg skrive de vigtigste fokuspunkter til din næste træning, når du har sendt mig dine data.
        </div>
    </div>
    
    <div class="calendar-container">
        <div class="calendar-nav">
            <button class="nav-btn" onclick="changeWeek(-1)">&lt;</button>
            <span id="week-display">UGE --</span>
            <button class="nav-btn" onclick="changeWeek(1)">&gt;</button>
        </div>
        <div class="week-grid" id="week-grid"></div>
    </div>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div class="timer-container">
        <button class="timer-btn" id="timer-btn" onclick="startTimer()">[ Start 90 sek Pause ]</button>
        <div class="timer-bar-bg"><div class="timer-bar-fill" id="timer-fill"></div></div>
    </div>

    <div id="workout-container"></div>

    <div class="ai-log-section">
        <div class="ai-log-title"><span>🤖</span> DIN FEEDBACK TIL TRÆNER</div>
        <textarea id="ai_log_input" placeholder="Hvordan føles kroppen? Var vægten for let/tung?"></textarea>
    </div>

    <div class="bottom-fixed-container">
        <div class="btn-container">
            <button class="action-btn btn-save" onclick="saveData()">[Gem Data]</button>
            <button class="action-btn btn-export" onclick="exportData()">[Send til AI]</button>
        </div>
        <div id="version-info">V1.7 | Henter...</div>
    </div>

    <div id="toast">DATA GEMT</div>

<script>
    // -------------------------------------------------------------------
    // COACHENS NOTER - HER INDSÆTTER JEG MINE RÅD TIL DIG
    // -------------------------------------------------------------------
    const coachAdjustments = {
        global: "Fokus i dag: Kontrolleret tempo. Mærk bryststøtten i rygtræk. Husk 90 sek pause hver gang!",
        cardio: "GØR DETTE: Hvis du mærker det mindste i halebenet, så gå over til incline-walk med det samme.",
        benpres: "", // Tomme felter vises ikke
        brystpres: "",
        rygtraek: "GØR DETTE: Træk med albuerne, ikke med hænderne. Hold spændet i 1 sek i toppen.",
        traekned: "",
        benstraek: ""
    };

    const exercises = [
        { id: 'cardio', name: 'Løbebånd (Varme)', type: 'cardio', info: '<strong>Intervaller:</strong> 1 min løb / 2 min gang (gentag 3-4 gange).<br><strong>Ved smerte:</strong> Skru op for incline og gå.' },
        { id: 'benpres', name: 'Siddende Benpres', type: 'strength', sets: 3, info: '<strong>Husk:</strong> Press lænden helt tilbage i sædet. De sidste 2 reps skal være hårde!' },
        { id: 'brystpres', name: 'Siddende Brystpres', type: 'strength', sets: 3, info: '<strong>Husk:</strong> Kontrolleret bevægelse fremad. Ryggen helt mod lænet.' },
        { id: 'rygtraek', name: 'Rygtræk m. bryststøtte', type: 'strength', sets: 3, info: '<strong>Hvorfor:</strong> Aflaster lænden helt. Træk dine skuldre tilbage.' },
        { id: 'traekned', name: 'Træk til bryst (Lat)', type: 'strength', sets: 3, info: '<strong>Husk:</strong> Træk stangen ned til toppen af brystet. Læn dig kun lidt tilbage.' },
        { id: 'benstraek', name: 'Benstræk (Leg Ext)', type: 'strength', sets: 3, info: '<strong>Husk:</strong> Isolerer forlåret. Meget sikker øvelse.' }
    ];

    let currentWeekOffset = 0;

    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        return Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
    }

    function changeWeek(offset) { currentWeekOffset += offset; setupCalendar(); }

    function setupCalendar() {
        const grid = document.getElementById('week-grid');
        const now = new Date();
        now.setDate(now.getDate() + (currentWeekOffset * 7));
        document.getElementById('week-display').innerText = "UGE " + getWeekNumber(now);
        const dayNames = ['Man', 'Tir', 'Ons', 'Tor', 'Fre', 'Lør', 'Søn'];
        const monday = new Date(now);
        monday.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1));
        grid.innerHTML = '';
        for(let i=0; i<7; i++) {
            const d = new Date(monday);
            d.setDate(monday.getDate() + i);
            const dateStr = d.toLocaleDateString('da-DK', {day:'2-digit', month:'2-digit'});
            const id = `day_${d.toISOString().split('T')[0]}`;
            const dayBox = document.createElement('div');
            dayBox.className = 'day-box';
            dayBox.id = id;
            dayBox.innerHTML = `<span>${dayNames[i]}</span><span>${dateStr}</span><span class="day-check">✓</span>`;
            dayBox.onclick = () => { dayBox.classList.toggle('active'); saveData(); };
            grid.appendChild(dayBox);
        }
        loadCalendarState();
    }

    let timerInterval;
    function startTimer() {
        clearInterval(timerInterval);
        let btn = document.getElementById('timer-btn');
        let fill = document.getElementById('timer-fill');
        let timeLeft = 90;
        timerInterval = setInterval(() => {
            timeLeft--;
            btn.innerText = `Pause: ${timeLeft} sek`;
            fill.style.width = ((90 - timeLeft) / 90 * 100) + "%";
            if(timeLeft <= 0) { clearInterval(timerInterval); btn.innerText = "KLAR!"; fill.style.width = "100%"; }
        }, 1000);
    }

    function toggleInfo(id) { document.getElementById(`${id}_info_box`).classList.toggle('show'); }

    function setStatus(exId, color) {
        ['g','y','r'].forEach(c => document.getElementById(`${exId}_status_${c}`).className = 'status-btn');
        document.getElementById(`${exId}_status_${color.charAt(0)}`).classList.add('active-' + color.charAt(0));
        document.getElementById(`${exId}_status_val`).value = color;
    }

    function renderApp() {
        const container = document.getElementById('workout-container');
        document.getElementById('global-coach-advice').innerText = coachAdjustments.global;

        exercises.forEach((ex, index) => {
            const card = document.createElement('div');
            card.className = `exercise-card`;
            
            // Tjek om der er specifik coach feedback til denne øvelse
            const adjustmentHtml = coachAdjustments[ex.id] ? 
                `<div class="coach-adjustment"><strong>NYT:</strong> ${coachAdjustments[ex.id]}</div>` : '';

            let content = `
                <div class="card-header">
                    <div style="color:var(--neon-cyan);">${index+1}. ${ex.name}</div>
                    <button class="info-btn" onclick="toggleInfo('${ex.id}')">ℹ️ Info</button>
                </div>
                <div class="info-box" id="${ex.id}_info_box">
                    ${ex.info}
                    ${adjustmentHtml}
                </div>
                <div class="status-group">
                    <button class="status-btn" id="${ex.id}_status_g" onclick="setStatus('${ex.id}', 'green')">🟢 OK</button>
                    <button class="status-btn" id="${ex.id}_status_y" onclick="setStatus('${ex.id}', 'yellow')">🟡 ØM</button>
                    <button class="status-btn" id="${ex.id}_status_r" onclick="setStatus('${ex.id}', 'red')">🔴 AV</button>
                    <input type="hidden" id="${ex.id}_status_val">
                </div>
            `;

            if (ex.type === 'strength') {
                for (let i = 1; i <= 3; i++) {
                    content += `
                        <div class="set-row">
                            <div class="set-inputs">
                                <span>Sæt ${i}</span>
                                <div><input type="number" id="${ex.id}_s${i}_kg" placeholder="KG"> x <input type="number" id="${ex.id}_s${i}_reps" placeholder="REPS"></div>
                            </div>
                            <div class="ghost-text" id="${ex.id}_s${i}_ghost"></div>
                            <div class="pause-reminder">>> Husk 90 sek pause!</div>
                        </div>
                    `;
                }
            } else {
                content += `
                    <div class="set-row">
                        <div class="set-inputs"><span>Tid (min)</span><input type="number" id="${ex.id}_time" placeholder="MIN"></div>
                        <div class="ghost-text" id="${ex.id}_ghost"></div>
                    </div>
                `;
            }

            content += `
                <textarea id="${ex.id}_note" placeholder="Noter..."></textarea>
                <div style="text-align:right; margin-top:10px;">Færdig? <input type="checkbox" id="${ex.id}_check" onchange="updateProgress()"></div>
            `;
            card.innerHTML = content;
            container.appendChild(card);
        });
        setupCalendar();
        loadData();
    }

    function updateProgress() {
        let done = 0;
        exercises.forEach(ex => { if(document.getElementById(`${ex.id}_check`).checked) done++; });
        document.getElementById('progress-bar').style.width = (done / exercises.length * 100) + "%";
    }

    function saveData() {
        let activeDays = JSON.parse(localStorage.getItem('calendar_V1_7') || "[]");
        document.querySelectorAll('.day-box').forEach(db => {
            if(db.classList.contains('active') && !activeDays.includes(db.id)) activeDays.push(db.id);
            else if(!db.classList.contains('active') && activeDays.includes(db.id)) activeDays = activeDays.filter(a => a !== db.id);
        });
        localStorage.setItem('calendar_V1_7', JSON.stringify(activeDays));
        let data = { date: new Date().toLocaleDateString('da-DK'), ai_log: document.getElementById('ai_log_input').value, exercises: {} };
        exercises.forEach(ex => {
            let exData = { checked: document.getElementById(`${ex.id}_check`).checked, status: document.getElementById(`${ex.id}_status_val`).value, note: document.getElementById(`${ex.id}_note`).value };
            if(ex.type === 'strength') {
                exData.sets = [
                    {kg: document.getElementById(`${ex.id}_s1_kg`).value, reps: document.getElementById(`${ex.id}_s1_reps`).value},
                    {kg: document.getElementById(`${ex.id}_s2_kg`).value, reps: document.getElementById(`${ex.id}_s2_reps`).value},
                    {kg: document.getElementById(`${ex.id}_s3_kg`).value, reps: document.getElementById(`${ex.id}_s3_reps`).value}
                ];
            } else { exData.time = document.getElementById(`${ex.id}_time`).value; }
            data.exercises[ex.id] = exData;
        });
        localStorage.setItem('workoutData_V1_7', JSON.stringify(data));
        showToast("DATA GEMT");
    }

    function loadCalendarState() {
        let activeDays = JSON.parse(localStorage.getItem('calendar_V1_7') || "[]");
        activeDays.forEach(id => { if(document.getElementById(id)) document.getElementById(id).classList.add('active'); });
    }

    function loadData() {
        const saved = localStorage.getItem('workoutData_V1_7');
        if (!saved) return;
        const data = JSON.parse(saved);
        const isToday = data.date === new Date().toLocaleDateString('da-DK');
        if(isToday) document.getElementById('ai_log_input').value = data.ai_log || '';
        exercises.forEach(ex => {
            const ed = data.exercises[ex.id];
            if(!ed) return;
            if(isToday) {
                document.getElementById(`${ex.id}_check`).checked = ed.checked;
                document.getElementById(`${ex.id}_note`).value = ed.note;
                if(ed.status) setStatus(ex.id, ed.status);
                if(ex.type === 'strength') {
                    ed.sets.forEach((s, i) => {
                        document.getElementById(`${ex.id}_s${i+1}_kg`).value = s.kg;
                        document.getElementById(`${ex.id}_s${i+1}_reps`).value = s.reps;
                    });
                } else { document.getElementById(`${ex.id}_time`).value = ed.time; }
            } else {
                if(ex.type === 'strength') {
                    ed.sets.forEach((s, i) => { if(s.kg) document.getElementById(`${ex.id}_s${i+1}_ghost`).innerText = `Sidst: ${s.kg}kg x ${s.reps}`; });
                } else { document.getElementById(`${ex.id}_ghost`).innerText = `Sidst: ${ed.time} min`; }
            }
        });
        updateProgress();
    }

    function exportData() {
        saveData();
        const data = JSON.parse(localStorage.getItem('workoutData_V1_7'));
        let txt = `LOG ${data.date} | MichaelKHans\n-------------------\n`;
        txt += `FEEDBACK TIL AI: ${data.ai_log || 'Ingen'}\n\n`;
        exercises.forEach(ex => {
            const ed = data.exercises[ex.id];
            txt += `${ex.name}: `;
            if(ex.type === 'strength') { ed.sets.forEach((s, i) => { if(s.kg) txt += `S${i+1}: ${s.kg}x${s.reps} `; }); }
            else { txt += `${ed.time} min`; }
            txt += ` [Status: ${ed.status || '?'}]\n`;
        });
        navigator.clipboard.writeText(txt);
        showToast("KOPIERET TIL AI");
    }

    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.className = "show"; setTimeout(() => t.className = "", 2000); }

    async function fetchLatestVersion() {
        try {
            const response = await fetch('https://api.github.com/repos/MichaelKHans/traenings-app/commits?per_page=1');
            const data = await response.json();
            if (data[0]) {
                const date = new Date(data[0].commit.author.date).toLocaleDateString('da-DK', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
                document.getElementById('version-info').innerText = 'V1.7 | Opdateret ' + date;
            }
        } catch (e) { document.getElementById('version-info').innerText = 'V1.7 | Offline'; }
    }

    window.onload = () => { renderApp(); fetchLatestVersion(); };
</script>
</body>
</html>
